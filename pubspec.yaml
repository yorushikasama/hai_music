name: hai_music
description: A cross-platform music player application
publish_to: 'none'
version: 2.0.0+18

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^4.2.0
  provider: ^6.1.2
  shimmer: ^3.0.0
  # 网络请求 - 统一使用 dio
  dio: ^5.4.0
  # UI 组件
  flutter_lyric: ^2.0.4+6
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  # 数据存储
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.2
  path: ^1.8.3

  # 平台特定依赖
  # 桌面端依赖
  bitsdojo_window: ^0.1.6
  flutter_acrylic: ^1.1.4
  # 音频播放
  just_audio: ^0.9.36
  just_audio_media_kit: ^2.0.0
  media_kit_libs_windows_audio: ^1.0.4
  audio_service: ^0.18.12
  # 数据存储（可选）
  supabase_flutter: ^2.3.4
  minio: ^3.5.8
  # 本地音频
  on_audio_query: ^2.9.0
  audio_metadata_reader: ^1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo/logo.png"
  adaptive_icon_background: "#191919"
  adaptive_icon_foreground: "logo/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
